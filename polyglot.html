<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Polyglot — Language Course</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0e1116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Polyglot">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="description" content="Learn Chinese, Japanese, Korean, Russian and Spanish — lessons, spaced repetition, worksheets and an AI tutor. Works offline.">
<style>
:root{
  --bg:#0e1116; --panel:#151b26; --panel2:#1c2433; --line:#262f40;
  --text:#e9e7e0; --muted:#8b93a5; --acc:#ff4d3d; --accSoft:rgba(255,77,61,.14);
  --good:#5fd38a; --bad:#ff6b6b; --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
  font-size:16px; line-height:1.5;
}
.serif{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}
#glyph{
  position:fixed; right:-6vmin; top:8vmin; font-size:58vmin; line-height:1;
  color:var(--acc); opacity:.055; pointer-events:none; z-index:0; user-select:none;
  font-family:Georgia,serif; transition:color .4s;
}
#app{position:relative; z-index:1; max-width:780px; margin:0 auto; padding:0 16px 96px}
header{
  padding-top:calc(18px + env(safe-area-inset-top));
  display:flex; align-items:center; justify-content:space-between;
  padding-bottom:10px; gap:10px; flex-wrap:wrap;
}
.brand{font-size:22px; letter-spacing:.18em; font-weight:700}
.brand b{color:var(--acc)}
.stats{display:flex; gap:8px; font-size:13px; color:var(--muted)}
.stat{background:var(--panel); border:1px solid var(--line); padding:5px 11px; border-radius:999px; white-space:nowrap}
.stat strong{color:var(--text)}
.langs{display:flex; gap:8px; overflow-x:auto; padding:6px 0 14px; scrollbar-width:none}
.langs::-webkit-scrollbar{display:none}
.langpill{
  flex:0 0 auto; border:1px solid var(--line); background:var(--panel); color:var(--text);
  padding:9px 15px; border-radius:999px; cursor:pointer; font-size:15px;
}
.langpill.active{border-color:var(--acc); background:var(--accSoft); color:var(--acc); font-weight:600}
nav#tabs{
  position:fixed; bottom:0; left:0; right:0; z-index:20;
  display:flex; justify-content:center; gap:0;
  background:rgba(14,17,22,.92); backdrop-filter:blur(10px);
  border-top:1px solid var(--line); padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
nav#tabs button{
  flex:1; max-width:130px; background:none; border:none; color:var(--muted);
  font-size:11.5px; padding:7px 2px; cursor:pointer; border-radius:10px;
}
nav#tabs button .ic{display:block; font-size:19px; margin-bottom:2px}
nav#tabs button.active{color:var(--acc)}
.card{
  background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
  padding:18px; margin-bottom:14px;
}
.card h2{font-size:19px; margin-bottom:6px}
.card h3{font-size:15px; margin:14px 0 6px; color:var(--acc); letter-spacing:.04em; text-transform:uppercase; font-size:12.5px}
.muted{color:var(--muted); font-size:14px}
.btn{
  display:inline-block; background:var(--acc); color:#10131a; border:none; font-weight:700;
  padding:12px 20px; border-radius:12px; cursor:pointer; font-size:15.5px;
}
.btn.ghost{background:var(--panel2); color:var(--text); border:1px solid var(--line); font-weight:600}
.btn.small{padding:8px 13px; font-size:13.5px; border-radius:10px}
.btn:disabled{opacity:.4; cursor:default}
.btn:focus-visible,.langpill:focus-visible,nav#tabs button:focus-visible{outline:2px solid var(--acc); outline-offset:2px}
.unit{
  display:flex; align-items:center; gap:14px; background:var(--panel); border:1px solid var(--line);
  border-radius:var(--radius); padding:15px 16px; margin-bottom:10px; cursor:pointer; width:100%; text-align:left; color:var(--text);
}
.unit.locked{opacity:.45; cursor:not-allowed}
.unit .num{
  width:44px; height:44px; flex:0 0 44px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:20px;
  background:var(--accSoft); color:var(--acc); border:1px solid var(--acc);
}
.unit.done .num{background:var(--acc); color:#10131a}
.unit .t{font-weight:700; font-size:16px}
.unit .s{font-size:13px; color:var(--muted)}
.progressbar{height:6px; background:var(--panel2); border-radius:99px; overflow:hidden; margin-top:8px}
.progressbar i{display:block; height:100%; background:var(--acc); border-radius:99px; transition:width .3s}
.vocabrow{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:10px 2px; border-bottom:1px solid var(--line); font-size:15px;
}
.vocabrow:last-child{border-bottom:none}
.vocabrow .tg{font-size:19px}
.vocabrow .rm{color:var(--acc); font-size:13px}
.vocabrow .en{color:var(--muted); font-size:14px; text-align:right}
.speak{background:none; border:none; cursor:pointer; font-size:17px; color:var(--muted); padding:4px}
.bigcard{
  background:var(--panel); border:1px solid var(--line); border-radius:18px;
  padding:40px 22px; text-align:center; margin:14px 0; min-height:240px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  cursor:pointer; user-select:none;
}
.bigcard .target{font-size:44px; line-height:1.25}
.bigcard .roman{color:var(--acc); font-size:17px}
.bigcard .eng{font-size:21px; color:var(--text)}
.opts{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px}
.opts button{
  background:var(--panel2); border:1px solid var(--line); color:var(--text);
  padding:15px 10px; border-radius:12px; font-size:16.5px; cursor:pointer;
}
.opts button.correct{border-color:var(--good); background:rgba(95,211,138,.15); color:var(--good)}
.opts button.wrong{border-color:var(--bad); background:rgba(255,107,107,.13); color:var(--bad)}
.matchgrid{display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:14px}
.matchgrid button{
  background:var(--panel2); border:1px solid var(--line); color:var(--text);
  padding:13px 8px; border-radius:12px; font-size:15.5px; cursor:pointer;
}
.matchgrid button.sel{border-color:var(--acc); color:var(--acc)}
.matchgrid button.gone{opacity:.18; pointer-events:none}
.matchgrid button.err{border-color:var(--bad); color:var(--bad)}
.tokens,.answer{display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; min-height:46px}
.answer{border:1px dashed var(--line); border-radius:12px; padding:8px}
.tok{
  background:var(--panel2); border:1px solid var(--line); color:var(--text);
  padding:9px 13px; border-radius:10px; font-size:17px; cursor:pointer;
}
.tok.inans{border-color:var(--acc)}
input[type=text], textarea{
  width:100%; background:var(--panel2); border:1px solid var(--line); color:var(--text);
  border-radius:12px; padding:13px; font-size:16px; font-family:inherit;
}
textarea{min-height:130px; resize:vertical}
input:focus,textarea:focus{outline:none; border-color:var(--acc)}
.feedback{margin-top:12px; font-weight:700; min-height:24px}
.feedback.good{color:var(--good)} .feedback.bad{color:var(--bad)}
.sessiontop{display:flex; align-items:center; gap:12px; margin:14px 0 4px}
.sessiontop .progressbar{flex:1; margin:0}
.qcount{font-size:13px; color:var(--muted); white-space:nowrap}
.exit{background:none;border:none;color:var(--muted);font-size:21px;cursor:pointer;padding:4px}
.grammar{background:var(--panel2); border-left:3px solid var(--acc); padding:12px 14px; border-radius:0 12px 12px 0; font-size:14.5px; margin:10px 0}
.pillrow{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
.score{font-size:52px; font-weight:800; color:var(--acc); text-align:center}
.center{text-align:center}
.journalentry{border-bottom:1px solid var(--line); padding:12px 0}
.journalentry:last-child{border-bottom:none}
.journalentry .d{font-size:12px; color:var(--muted)}
.srsbtns{display:flex; gap:10px; margin-top:16px}
.srsbtns .btn{flex:1}
.again{background:var(--bad)!important} .easy{background:var(--good)!important}
table.ws{width:100%; border-collapse:collapse; margin:8px 0}
table.ws td,table.ws th{border:1px solid #999; padding:7px 9px; font-size:14px; text-align:left}
#printArea{display:none}
@media print{
  body{background:#fff}
  #app,#glyph,nav#tabs{display:none!important}
  #printArea{display:block; color:#000; font-family:Georgia,serif; padding:10px}
  #printArea h1{font-size:22px; margin-bottom:2px}
  #printArea h2{font-size:16px; margin:16px 0 6px}
  #printArea .ln{border-bottom:1px solid #777; height:26px}
}
@media(min-width:700px){
  nav#tabs{position:sticky; top:0; bottom:auto; border-top:none; border-bottom:1px solid var(--line); margin:0 -16px 8px; justify-content:flex-start; padding:4px 10px}
  nav#tabs button{flex:0 0 auto; display:flex; align-items:center; gap:7px; font-size:14px; padding:10px 14px}
  nav#tabs button .ic{display:inline; font-size:16px; margin:0}
  #app{padding-bottom:30px}
  .bigcard .target{font-size:56px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

ko:{name:"Korean",native:"한국어",glyph:"한",tts:"ko-KR",acc:"#4dabf7",romanLabel:"romanization",
 grammar:[
  "Korean sentences end with the verb: 저는 학생입니다 — “I (topic) student-am.” 는/은 marks the topic; 입니다 is the formal “to be.” Hangul is an alphabet — each block is one syllable.",
  "Native Korean numbers (하나, 둘, 셋…) count things and hours. 오늘 = today, 내일 = tomorrow, 지금 = now.",
  "을/를 marks the object: 물을 마셔요 = water-(object) drink. The 〜요 verb ending is the everyday polite style you'll use most.",
  "있어요 = have / exist; 없어요 = don't have. 친구가 있어요 = I have a friend. 에 marks direction or location: 집에 가요 = I go home.",
  "Most daily verbs in polite style end in 〜요: 가요 (go), 자요 (sleep), 해요 (do). 하다 verbs combine a noun + 해요: 공부해요 = study.",
  "어디 = where. 이/가 marks the subject: 역이 어디예요? = Where is the station? Answer with 여기 (here) / 거기 (there).",
  "Descriptive verbs work like verbs — no “is” needed: 집이 커요 = the house is-big. 아주 = very. Dictionary forms end in 다 (크다), but you speak in 요-form.",
  "Past tense inserts 았/었: 가요 → 갔어요 (went), 해요 → 했어요 (did), 먹어요 → 먹었어요 (ate). Time words come first: 어제 학교에 갔어요.",
  "Weather uses descriptive verbs too: 더워요 (it's hot), 추워요 (it's cold) — both irregular ㅂ verbs. Hobbies: [noun]를 좋아해요 = I like [noun].",
  "에서 marks where an action happens: 회사에서 일해요 = I work at a company (에 = destination, 에서 = action location). 님 adds respect: 사장님, 선생님.",
  "생각해요 = I think; 재미있어요 literally “fun exists” = interesting; 재미없어요 = boring. 하다-nouns become verbs: 걱정 (worry) → 걱정해요.",
  "Formal news Korean leans on Sino-Korean words: 경제, 환경, 사회 — many sound like their Chinese cousins. 〜고 있어요 = is …-ing: 변하고 있어요 = is changing. This register is TOPIK 4 territory."
 ],

ru:{name:"Russian",native:"Русский",glyph:"Я",tts:"ru-RU",acc:"#ffd43b",romanLabel:"transliteration",
 grammar:[
  "Russian drops “to be” in the present: Я студент = “I student” = I am a student. There are no articles (a/the). Negate with не: Я не студент.",
  "Numbers: один, два, три… Time words: сегодня (today), завтра (tomorrow), сейчас (now). “See you tomorrow” = До завтра, literally “until tomorrow.”",
  "Verbs conjugate by person: я пью (I drink), ты пьёшь (you drink). Adjectives agree with nouns: вкусный суп (tasty soup).",
  "“I have” uses у меня есть — literally “by me there is”: У меня есть брат = I have a brother. Любить (to love) takes the accusative: Я люблю маму.",
  "Verb endings carry who acts: я говорю (I speak), она спит (she sleeps), он работает (he works). По-русски = “in Russian.”",
  "Где = where: Где туалет? No verb needed. Answer with здесь (here) / там (there): Школа там.",
  "Adjectives agree with their noun's gender: новый дом (m), новая книга (f), новое окно (n). очень = very: очень большой.",
  "Past tense marks gender, not person: он был / она была (he/she was). Future of “to be”: я буду. Time first: Вчера я был дома.",
  "Weather statements need no subject: Сегодня холодно = today (it's) cold; Жарко = (it's) hot. любить + accusative for hobbies: Я люблю музыку.",
  "в + prepositional case = located in: в компании, в университете. занят/занята (busy) agrees with gender like past verbs.",
  "Feelings as short adjectives: Я устал(а) = I'm tired; Я рад(а) = I'm glad. думать, что… = to think that…",
  "News Russian builds on verb aspect pairs: расти (grow), падать (fall), меняться (change). -ся verbs are reflexive: общество меняется = society is changing (itself)."
 ],

let SES=null;
function buildQuestions(ui){
 const l=L(),u=l.units[ui],pool=u.v,qs=[];
 // 4 MCQ target→english
 pick(pool,4).forEach(w=>qs.push({t:"mcq",w,opts:shuffle([w[2],...pick(pool.map(x=>x[2]),3,w[2])])}));
 // 2 reverse MCQ english→target
 pick(pool,2).forEach(w=>qs.push({t:"rmcq",w,opts:shuffle([w[0],...pick(pool.map(x=>x[0]),3,w[0])])}));
 // 2 typing
 pick(pool,2).forEach(w=>qs.push({t:"type",w}));
 // 1 listening (if TTS available) else extra MCQ
 const w0=pick(pool,1)[0];
 if("speechSynthesis"in window)qs.push({t:"listen",w:w0,opts:shuffle([w0[2],...pick(pool.map(x=>x[2]),3,w0[2])])});
 else qs.push({t:"mcq",w:w0,opts:shuffle([w0[2],...pick(pool.map(x=>x[2]),3,w0[2])])});
 // 1 matching (5 pairs)
 qs.push({t:"match",pairs:pick(pool,5)});
 // sentence builders
 u.s.forEach(s=>qs.push({t:"build",s}));
 return shuffle(qs);
}

 if(q.t==="mcq"||q.t==="listen"){
  const isL=q.t==="listen";
  qFrame(`

   isL?"Listen, then choose the meaning":"What does this mean?");

 }
 else if(q.t==="rmcq"){

   <div class="bigcard" style="min-height:120px;padding:24px;cursor:default"><div class="eng" style="font-size:26px">${esc(q.w[2])}</div></div>

   if($("#contBtn").style.display==="block")return;

   if(!ok)document.querySelectorAll(".opts button").forEach(x=>{if(x.dataset.o===q.w[0])x.className="correct";});
   if(ok)speak(q.w[0]);
   markDone(ok,`It's ${q.w[0]} (${q.w[1]}).`);
  });
 }
 else if(q.t==="type"){
  qFrame(`
   <div class="bigcard" style="min-height:130px;padding:24px;cursor:default">
     <div class="target">${esc(q.w[0])}</div><div class="roman">${esc(q.w[1])}</div></div>
   <input type="text" id="typeIn" placeholder="type the English meaning…" autocomplete="off">
   <div class="pillrow"><button class="btn" id="checkBtn">Check</button></div>`,
   "Translate to English");
  speak(q.w[0]);
  const go=()=>{ if($("#contBtn").style.display==="block")return;
   markDone(engMatches($("#typeIn").value,q.w[2]),`It means “${q.w[2]}”.`); };
  $("#checkBtn").onclick=go;
  $("#typeIn").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
  $("#typeIn").focus();
 }
 else if(q.t==="match"){
  if(!SES.m)SES.m={left:shuffle(q.pairs.map(p=>p[0])),right:shuffle(q.pairs.map(p=>p[2])),sel:null,found:0,miss:0};
  const m=SES.m,map={};q.pairs.forEach(p=>map[p[0]]=p[2]);
  qFrame(`<div class="matchgrid" id="mg">
    ${m.left.map(t=>`<button data-side="l" data-v="${esc(t)}">${esc(t)}</button>`).join("")}
    ${m.right.map(t=>`<button data-side="r" data-v="${esc(t)}">${esc(t)}</button>`).join("")}
   </div>`,"Match each word to its meaning (tap one on each side)");
  const btns=[...document.querySelectorAll("#mg button")];
  btns.forEach(b=>b.onclick=()=>{
   if(b.classList.contains("gone"))return;
   if(!m.sel){m.sel=b;b.classList.add("sel");return;}
   if(m.sel===b){b.classList.remove("sel");m.sel=null;return;}
   if(m.sel.dataset.side===b.dataset.side){m.sel.classList.remove("sel");m.sel=b;b.classList.add("sel");return;}
   const l=m.sel.dataset.side==="l"?m.sel:b, r=m.sel.dataset.side==="l"?b:m.sel;
   if(map[l.dataset.v]===r.dataset.v){
     l.classList.add("gone");r.classList.add("gone");l.classList.remove("sel");m.found++;speak(l.dataset.v);
     if(m.found===q.pairs.length){markDone(m.miss<=1,`Completed with ${m.miss} misses (1 allowed).`);SES.m=null;}
   }else{
     m.miss++;l.classList.add("err");r.classList.add("err");
     setTimeout(()=>{l.classList.remove("err","sel");r.classList.remove("err","sel");},450);
   }
   m.sel=null;
  });
 }
 else if(q.t==="build"){
  if(!SES.b)SES.b={bank:shuffle(q.s.tok.map((t,i)=>({t,i}))),ans:[]};
  const b=SES.b,joiner=S.lang==="zh"?"":" ";
  qFrame(`
   <div class="bigcard" style="min-height:90px;padding:18px;cursor:default"><div class="eng" style="font-size:20px">“${esc(q.s.e)}”</div></div>

   <div class="tokens" id="bankRow">${b.bank.map((x,ix)=>`<button class="tok" data-bi="${ix}">${esc(x.t)}</button>`).join("")}</div>
   <div class="pillrow"><button class="btn" id="checkBtn" ${b.bank.length?"disabled":""}>Check</button></div>`,
   "Build the sentence — tap the tiles in order");

   b.ans.push(b.bank.splice(+btn.dataset.bi,1)[0]);renderSession();});
  document.querySelectorAll("#ansRow .tok").forEach(btn=>btn.onclick=()=>{
   b.bank.push(b.ans.splice(+btn.dataset.ai,1)[0]);renderSession();});
  $("#checkBtn").onclick=()=>{
   if($("#contBtn").style.display==="block")return;
   const built=b.ans.map(x=>x.t).join(joiner), target=q.s.tok.join(joiner);

   SES.b=null;
  };
 }
}

function cefr(){const n=Object.keys(LS().passed).length;
 return n<3?"A1 (absolute beginner)":n<6?"A2 (elementary)":n<9?"B1 (intermediate)":n<12?"B1+/B2 (upper-intermediate)":"B2/N2 (upper-intermediate, exam level)";}
async function aiCall(prompt){
 const c=S.cfg;
 if(c.url.includes("anthropic")){
  const r=await fetch(c.url,{method:"POST",headers:{"Content-Type":"application/json"},
   body:JSON.stringify({model:c.model,max_tokens:1000,messages:[{role:"user",content:prompt}]})});
  if(!r.ok)throw new Error("API error "+r.status);
  const d=await r.json();
  return (d.content||[]).filter(x=>x.type==="text").map(x=>x.text).join("\n");
 }else{
  const headers={"Content-Type":"application/json"};
  if(c.key)headers.Authorization="Bearer "+c.key;
  const r=await fetch(c.url,{method:"POST",headers,
   body:JSON.stringify({model:c.model,messages:[{role:"user",content:prompt}],max_tokens:1500,temperature:.7})});
  if(!r.ok)throw new Error("API error "+r.status);
  const d=await r.json();
  return d.choices?.[0]?.message?.content||"";
 }
}
function parseAIJSON(t){
 t=t.replace(/```json|```/g,"").trim();
 const a=t.indexOf("{"),b=t.lastIndexOf("}");
 return JSON.parse(t.slice(a,b+1));
}

  </div>
  <div class="card">
   <h3 style="margin-top:0">Engine settings</h3>
   <p class="muted" style="font-size:13px">Inside Claude.ai the default endpoint works with no key. Running this file locally? Point it at any OpenAI-compatible server — e.g. a vLLM instance at <code>http://&lt;host&gt;:8000/v1/chat/completions</code> — and set the model name it serves.</p>
   <label class="muted" style="font-size:13px">Endpoint URL</label>
   <input type="text" id="cfgUrl" value="${esc(c.url)}">
   <label class="muted" style="font-size:13px">Model</label>
   <input type="text" id="cfgModel" value="${esc(c.model)}" style="margin-bottom:8px">
   <label class="muted" style="font-size:13px">API key (only if your server needs one)</label>
   <input type="text" id="cfgKey" value="${esc(c.key)}" placeholder="optional">
   <div class="pillrow"><button class="btn small" id="cfgSave">Save settings</button></div>
  </div>`;
 $("#cfgSave").onclick=()=>{c.url=$("#cfgUrl").value.trim();c.model=$("#cfgModel").value.trim();c.key=$("#cfgKey").value.trim();save();$("#cfgSave").textContent="Saved ✓";setTimeout(()=>{if($("#cfgSave"))$("#cfgSave").textContent="Save settings";},1200);};
 $("#genRead").onclick=()=>genLesson("a short reading passage (4-7 sentences) about an interesting real-world topic");
 $("#genConv").onclick=()=>genLesson("a natural two-person dialogue (6-10 turns, label speakers A and B)");
 $("#gradeBtn").onclick=gradeWriting;
}
function aiBusy(msg){$("#aiOut").innerHTML=`<div class="grammar">⏳ ${esc(msg)}</div>`;}
function aiErr(e){$("#aiOut").innerHTML=`<div class="grammar" style="border-left-color:var(--bad)">Couldn't reach the tutor engine (${esc(e.message)}). Check the endpoint settings below — and note that a local server must allow CORS (vLLM: <code>--allowed-origins '["*"]'</code>).</div>`;}
async function genLesson(kind){
 aiBusy("Generating your lesson…");
 const l=L();
 const prompt=`You are a ${l.name} language tutor. Create ${kind} in ${l.name} for a ${cefr()} learner. Respond with ONLY valid JSON, no markdown, no commentary, exactly this shape:
{"passage":"the ${l.name} text","roman":"${l.romanLabel} of the passage","translation":"English translation","vocab":[["word in ${l.name}","${l.romanLabel}","english meaning"], (5 key words from the passage)],"questions":[{"q":"comprehension question in English","opts":["4 short answer options"],"a":0}, (3 questions, a = index of correct option)]}`;
 try{
  const data=parseAIJSON(await aiCall(prompt));
  renderAILesson(data);
 }catch(e){aiErr(e);}
}
function renderAILesson(d){
 const qs=(d.questions||[]).slice(0,5);
 $("#aiOut").innerHTML=`
  <div class="bigcard" style="cursor:default;text-align:left;align-items:flex-start;min-height:0;padding:22px">
    <div style="font-size:20px;line-height:1.8;white-space:pre-wrap">${esc(d.passage||"")}</div>
    <div class="roman" style="font-size:14px;white-space:pre-wrap">${esc(d.roman||"")}</div>
    <div class="pillrow">
      <button class="btn small ghost" id="aiHear">🔊 Listen</button>
      <button class="btn small ghost" id="aiTrans">Show translation</button>
    </div>
    <div id="aiTransTxt" class="muted" style="display:none;white-space:pre-wrap">${esc(d.translation||"")}</div>
  </div>
  ${(d.vocab||[]).length?`<div class="card"><h3 style="margin-top:0">Key vocabulary</h3>${d.vocab.map(w=>`<div class="vocabrow"><span><span class="tg" style="font-size:17px">${esc(w[0])}</span> <span class="rm">${esc(w[1]||"")}</span></span><span class="en">${esc(w[2]||"")}</span></div>`).join("")}</div>`:""}
  ${qs.map((q,qi)=>`<div class="card"><strong>${qi+1}. ${esc(q.q)}</strong><div class="opts" data-q="${qi}">${q.opts.map((o,oi)=>`<button data-oi="${oi}">${esc(o)}</button>`).join("")}</div></div>`).join("")}`;
 $("#aiHear").onclick=()=>speak(d.passage);
 $("#aiTrans").onclick=()=>{$("#aiTransTxt").style.display="block";};
 qs.forEach((q,qi)=>{
  document.querySelectorAll(`[data-q="${qi}"] button`).forEach(b=>b.onclick=()=>{
   const ok=+b.dataset.oi===q.a;
   b.className=ok?"correct":"wrong";
   document.querySelectorAll(`[data-q="${qi}"] button`).forEach(x=>{if(+x.dataset.oi===q.a)x.classList.add("correct");x.disabled=true;});
   if(ok)addXP(5);
  });
 });
}
async function gradeWriting(){
 const t=$("#gradeIn").value.trim(); if(!t)return;
 aiBusy("Reviewing your writing…");
 const prompt=`You are a strict but kind ${L().name} teacher. A ${cefr()} student wrote:\n"""${t}"""\nReply in plain text (no JSON): 1) Corrected version. 2) Each mistake explained in one line. 3) One upgraded, more natural version a level above. 4) A score out of 10. Keep it under 250 words.`;
 try{
  const out=await aiCall(prompt);
  $("#aiOut").innerHTML=`<div class="card" style="margin:0"><h3 style="margin-top:0">Teacher's corrections (+15 XP)</h3><div style="white-space:pre-wrap;font-size:14.5px">${esc(out)}</div></div>`;
  addXP(15);
 }catch(e){aiErr(e);}
}

/* ================= PWA ================= */
if("serviceWorker"in navigator){
 window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js").catch(()=>{});});
}
(function installHint(){
 const standalone=window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone===true;
 const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
 if(standalone||store.get("pg_hint")==="1")return;
 const bar=document.createElement("div");
 bar.style.cssText="position:fixed;top:0;left:0;right:0;z-index:50;background:var(--panel2);border-bottom:1px solid var(--line);padding:10px 14px calc(10px);font-size:13px;color:var(--text);display:flex;gap:10px;align-items:center;padding-top:calc(10px + env(safe-area-inset-top))";
 bar.innerHTML=(isIOS
  ?`<span style="flex:1">📲 Install: tap <strong>Share</strong> <span style="opacity:.7">(the square-with-arrow)</span> → <strong>Add to Home Screen</strong>. Polyglot then runs fullscreen & offline.</span>`
  :`<span style="flex:1">📲 Install: open your browser menu → <strong>Add to Home screen / Install app</strong>.</span>`)
  +`<button id="hintX" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer">✕</button>`;
 document.body.appendChild(bar);
 document.getElementById("hintX").onclick=()=>{bar.remove();store.set("pg_hint","1");};
})();
/* ================= BOOT ================= */
load();applyTheme();renderAll();
</script>
</body>
</html>
